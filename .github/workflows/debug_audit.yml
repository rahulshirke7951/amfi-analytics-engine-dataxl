name: Debug Single Scheme Audit

on:
  workflow_dispatch:
    inputs:
      scheme_code:
        description: "Enter Scheme Code (e.g. 140088)"
        required: false
        type: string

  schedule:
    - cron: '30 20 * * 5'   # Saturday 2:00 AM IST (Friday 8:30 PM UTC)

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Environment
        run: |
          python --version
          python -c "import gdown; print('gdown version:', gdown.__version__)"
          pip show gdown

      - name: Run Debug Script
        env:
          SCHEME_CODE: ${{ github.event.inputs.scheme_code || '140088' }}
        run: |
          echo "Running audit for scheme: $SCHEME_CODE"
          python scripts/debug_audit_history.py $SCHEME_CODE

      - name: Upload Debug Output
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.event.inputs.scheme_code || '140088' }}
          path: debug_output/
